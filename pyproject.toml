[tool.uv.workspace]
members = ["packages/core", "packages/cdk", "integration"]

[tool.uv]
dev-dependencies = [
    # Testing
    "pytest>=8.0.0",
    "pytest-cov>=4.1.0",
    "pytest-asyncio>=0.23.0",
    "pytest-mock>=3.12.0",
    "pytest-bdd>=8.0.0",
    "moto[dynamodb,ssm,sqs,logs]>=5.0.0",
    # Linting and formatting
    "flake8>=7.0.0",
    "black>=24.0.0",
    "isort>=5.13.0",
    "mypy>=1.8.0",
    # Type stubs for AWS
    "boto3-stubs[essential]>=1.34.0",
    # Documentation
    "sphinx>=7.0.0",
    "sphinx-rtd-theme>=2.0.0",
    "sphinx-autodoc-typehints>=1.25.0",
    "myst-parser>=2.0.0",
]

# Pytest configuration
[tool.pytest.ini_options]
testpaths = ["packages/core/tests", "packages/cdk/tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "-v",
    "--strict-markers",
    "--strict-config",
    # importlib mode lets the core and cdk suites (both packaged as ``tests``)
    # run in a single pytest invocation without the package-name collision the
    # old test.sh avoided by running them separately.
    "--import-mode=importlib",
    "--cov=da_vinci",
    "--cov=da_vinci_cdk",
    "--cov-report=term-missing",
    "--cov-report=html",
]
markers = [
    "unit: Unit tests",
    "integration: Integration tests",
    "slow: Slow running tests",
]

# Flake8 configuration (in .flake8 file)

# Black configuration
[tool.black]
line-length = 100
target-version = ["py312"]
include = '\.pyi?$'
extend-exclude = '''
/(
  # directories
  \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | build
  | dist
)/
'''
# Use double quotes per CONTRIBUTING.md
skip-string-normalization = false

# isort configuration (black-compatible)
[tool.isort]
profile = "black"
line_length = 100
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true
known_first_party = ["da_vinci", "da_vinci_cdk"]
extend_skip_glob = ["*/cdk.out/*"]

# mypy configuration
[tool.mypy]
python_version = "3.12"
warn_return_any = false  # Relaxed - too strict for dynamic code patterns
warn_unused_configs = true
disallow_untyped_defs = false  # Relaxed - gradually add types over time
disallow_incomplete_defs = false  # Relaxed - allow partial annotations
check_untyped_defs = false  # Relaxed - allow untyped code
no_implicit_optional = false  # Relaxed - allow implicit optional
warn_redundant_casts = false  # Relaxed
warn_unused_ignores = false  # Relaxed - allow type: ignore comments
warn_no_return = false  # Relaxed
follow_imports = "normal"
strict_optional = false  # Relaxed - allow None without Optional
explicit_package_bases = true
namespace_packages = true
mypy_path = "packages/core:packages/cdk:integration"
# Each workspace member ships a ``tests`` package; under the three mypy roots
# above they all resolve to the same module name and collide. Tests are not
# part of the shipped type surface (and are coverage-omitted below), so exclude
# them from type checking.
exclude = ["(^|/)tests/"]

[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false

[[tool.mypy.overrides]]
module = [
    "requests_auth_aws_sigv4.*",
]
ignore_missing_imports = true

# Integration test application and the bundled examples use CDK app
# entry-point conventions (``python app.py`` with sys.path manipulation), so
# mypy cannot resolve the sibling/cross-module imports of ``handlers.*``,
# ``stacks.*`` and the example's ``table_client`` without duplicating the
# runtime path setup. These are exercised by ``cdk synth`` at deploy time —
# any actual breakage surfaces there.
[[tool.mypy.overrides]]
module = [
    "handlers.*",
    "stacks.*",
    "table_client",
]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "requests.*"
ignore_missing_imports = true

# Coverage configuration
[tool.coverage.run]
source = ["da_vinci", "da_vinci_cdk"]
omit = [
    "*/tests/*",
    "*/test_*.py",
    "*/__pycache__/*",
    "*/site-packages/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "class .*\\bProtocol\\):",
    "@(abc\\.)?abstractmethod",
]
